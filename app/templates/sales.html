<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Акции</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<link rel="stylesheet" href="/static/sales.css">

</head>
<body>
<div class="container" style="max-width: 800px;">
  <div class="container px-4 py-5" id="categories">
    <h1 class="pb-2 border-bottom">Скидки от партнеров</h1>

    <div class="row row-cols-1 row-cols-lg-2 align-items-stretch g-4 py-5">
      <a href="sales/new" class="text-decoration-none">
      <div class="col">
        <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-5 shadow-lg" >
          <div class="d-flex flex-column h-100 p-5 pb-3 text-blacktext-shadow-1">
            <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">Новые</h3>
            <ul class="d-flex list-unstyled mt-auto">
                <h3>Предложений: {{ new_count }}</h3>
            </ul>
          </div>
        </div>
      </div>
      </a>
      {% for category, count in categories.items() %}
      <a href="sales/category/{{category}}" class="text-decoration-none">
      <div class="col">
        <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-5 shadow-lg">
          <div class="d-flex flex-column h-100 p-5 pb-3 text-blacktext-shadow-1">
            <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">{{ category }}</h3>
            <ul class="d-flex list-unstyled mt-auto">
                <h3>Предложений: {{ count }}</h3>
            </ul>
          </div>
        </div>
      </div>
      </a>
      {% endfor %}
    </div>
  </div>
</div>

<div class="container" style="max-width: 800px;">
  <div class="container px-4 py-5" id="all_sales">
    <h1 class="pb-2 border-bottom">Предложения</h1>

    <div class="row row-cols-1 row-cols-lg-1 align-items-stretch g-4 py-5">

      {% for sale in sales %}
      <a href="sales/offer/{{ sale.id }}" class="text-decoration-none">
      <div class="col">
        <div class="card card-cover h-100 overflow-hidden text-bg-dark rounded-5 shadow-lg">
          <div class="d-flex flex-column h-100 p-5 pb-3 text-blacktext-shadow-1">
            <h3 class="pt-5 mt-5 mb-4 display-6 lh-1 fw-bold">{{ sale.sale_name }}</h3>
            <ul class="d-flex list-unstyled mt-auto"><h3>{{ sale.company_name }}</h3></ul>
          </div>
        </div>
      </div>
      </a>
      {% endfor %}
    </div>
  </div>
</div>


</body>
</html>

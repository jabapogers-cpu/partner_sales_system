<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ category }}</title>
<link rel="stylesheet" href="/static/sales.css">
</head>
<body>

  <a class="back-link" href="/sales">&larr; Все категории</a>

  <h2 style="text-align:center;">{{ category }}</h2>

  <div class="offers">
    {% for sale in sales %}
    <a class="offer" href="/sales/offer/{{ sale.id }}">
      <h3>{{ sale.sale_name }}</h3>
      <p><b>{{ sale.company_name }}</b></p>
    </a>
    {% else %}
    <p style="text-align:center;">В этой категории пока нет акций.</p>
    {% endfor %}
  </div>

</body>
</html>

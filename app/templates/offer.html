<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ sale.sale_name }}</title>
<link rel="stylesheet" href="/static/sales.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

</head>
<body>
<div class="container" style="max-width: 800px;">
  <p>&nbsp;</p>

<div> <div class="bd-example-snippet bd-code-snippet"> <div class="bd-example m-0 border-0">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="/sales">Акции</a></li>
            <li class="breadcrumb-item"><a href="/sales/category/{{sale.category}}">{{sale.category}}</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ sale.sale_name }}</li>
          </ol>
        </nav>
         </div>  </div> </div>


<div class="p-5 mb-4 bg-body-tertiary rounded-3">
  <div class="container-fluid py-5">
    <h1 class="display-4 fw-bold">{{ sale.sale_name }}</h1>
    <p class="col-md-10 fs-2"><b>{{ sale.company_name }}</b></p>
    <p class="col-md-10 fs-2"><b>Промокод:</b> {{ sale.promo }}</p>
    <p class="col-md-10 fs-2"><b>Как получить:</b> {{ sale.how_to_get }}</p>
    <p class="col-md-10 fs-2"><b>Срок действия: </b> до {{ sale.sale_period }}</p>
    <p class="col-md-10 fs-2"><b>О партнере:</b> {{ sale.about_partner }}</p>
    <button class="btn btn-outline-primary btn-lg" type="button"><a href="{{ sale.address }}">Воспользоваться акцией</a></button>
  </div>
</div>

</body>
</html>

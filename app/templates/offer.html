<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ sale.sale_name }}</title>
<link rel="stylesheet" href="/static/sales.css">
</head>
<body>

  <a class="back-link" href="/sales/category/{{ sale.category | urlencode }}">&larr; {{ sale.category }}</a>

  <div class="offers">
    <div class="offer offer-full">
      <h3>{{ sale.sale_name }}</h3>
      <p><b>{{ sale.company_name }}</b></p>
      <p>&nbsp;</p>
      <p><b>Промокод:</b> {{ sale.promo }}</p>
      <b><a href="{{ sale.address }}">Воспользоваться акцией</a></b>
      <p>&nbsp;</p>
      <p><b>Как получить:</b> {{ sale.how_to_get }}</p>
      <p>&nbsp;</p>
      <p><b>Срок действия: </b> до {{ sale.sale_period }}</p>
      <p>&nbsp;</p>
      <p><b>О партнере:</b> {{ sale.about_partner }}</p>
    </div>
  </div>

</body>
</html>

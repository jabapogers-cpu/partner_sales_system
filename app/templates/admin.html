<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Админка</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
<link rel="stylesheet" href="/static/sales.css">
</head>
<body>



  <h2 style="text-align:center;">Добавить акцию</h2>

  {% if success %}
  <div class="container" style="max-width: 600px;">
        <div class="alert alert-success" role="alert">
          <h4 class="alert-heading">Запись добавлена!</h4>
          <p>Вы успешно добавили свою акцию. Номер в таблице: {{ success }}</p>

    </div>
  </div>
  {% endif %}
  {% if error %}
  <p class="message message-error">Ошибка: {{ error }}</p>
  {% endif %}

  <form class="admin-form" method="post" action="/admin">
    <label for="company_name">Название вашей компании</label>
    <div class="mb-3">
          <input class="form-control form-control-lg" type="text" id="company_name" name="company_name" required placeholder="Введите название компании" aria-label=".form-control-lg example">
    </div>

    <label for="sale_name">Название акции</label>
    <div class="mb-3">
          <input class="form-control form-control-lg" type="text" id="sale_name" name="sale_name" required placeholder="Введите название акции" aria-label=".form-control-lg example">
    </div>



    <div class="mb-3">
            <label for="category" class="form-label">Категория</label>
            <select class="form-select form-select-lg" id="category" name="category" required>
              <option selected="">Выберите категорию</option>
              <option value="food">Еда</option>
              <option value="beauty">Красота и здоровье</option>
              <option value="clothes">Одежда и аксессуары</option>
              <option value="auto">Автомобили</option>
            </select>
          </div>

    <label for="how_to_get" class="form-label">Введите условия для получения / выполнения акции</label>
    <div class="input-group">
          <textarea class="form-control" id="how_to_get" name="how_to_get" required aria-label="With textarea"></textarea>
        </div>



    <label for="sale_period">Срок действия вашей акции (до какого числа)</label>
    <input type="date" id="sale_period" name="sale_period" required>

    <label for="about_partner" class="form-label">Информация о вашей компании</label>
    <div class="input-group">
          <textarea class="form-control" id="about_partner" name="about_partner" aria-label="With textarea"></textarea>
        </div>



    <label for="promo">Промокод</label>
    <div class="mb-3">
          <input class="form-control form-control-lg" type="text" id="promo" name="promo" required placeholder="Введите промокод" aria-label=".form-control-lg example">
    </div>



    <label for="address">Ссылка на сайт проведения акции</label>
    <div class="mb-3">
          <input class="form-control form-control-lg" type="text" id="address" name="address" required placeholder="Введите ссылку на сайт" aria-label=".form-control-lg example">
    </div>


    <button type="submit">Добавить</button>

  </form>

</body>
</html>
